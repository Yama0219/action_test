name: Export KiCad Outputs

on:
  push:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install KiCad
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-dev-nightly
          sudo apt update
          sudo apt install -y kicad-nightly

      - name: Check installed binaries
        run: |
          ls /usr/bin | grep kicad

      - name: Check KiCad
        run: kicad-cli-nightly version

      - name: Show files
        run: find .

      - name: Create output directory
        run: mkdir output

      - name: Export schematic PDF
        run: |
          kicad-cli-nightly sch export pdf \
            hardware/auto_test/auto_test.kicad_sch \
            --output output/schematic.pdf

      - name: Export schematic PDF
        run: |
          kicad-cli-nightly sch export pdf \
            hardware/auto_test/auto_test.kicad_sch \
            --output output/schematic.png

      - name: Export PCB PDF
        continue-on-error: true
        run: |
          kicad-cli-nightly pcb export pdf \
            --layers F.Cu,B.Cu,F.SilkS,Edge.Cuts \
            hardware/auto_test/auto_test.kicad_pcb \
            --output output/pcb.pdf

      - name: Render PCB PNG
        run: |
          kicad-cli-nightly pcb render \
            hardware/auto_test/auto_test.kicad_pcb \
            --output docs/pcb.png

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: kicad-output
          path: output/

      - name: Create docs directory
        run: mkdir -p docs
      
      - name: Push generated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          SHA="${GITHUB_SHA::7}"

          mkdir -p /tmp/generated
          cp -r docs /tmp/generated/

          git fetch origin generated

          git switch --orphan generated-tmp

          git rm -rf . || true

          cp -r /tmp/generated/* .

          git add .

          git commit -m "Auto update (${SHA}): ${ORIGINAL_MSG} [skip ci]" || echo "No changes"

          git push origin HEAD:generated --force
name: Export KiCad Outputs

on:
  push:

jobs:
  export:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install KiCad nightly
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-dev-nightly
          sudo apt update
          sudo apt install -y kicad-nightly imagemagick

      - name: Detect KiCad project
        shell: bash
        run: |
          PROJ=$(find . -maxdepth 1 -name "*.kicad_pro" | head -n 1)

          if [ -z "$PROJ" ]; then
            echo "No KiCad project found"
            exit 1
          fi

          BASENAME=$(basename "$PROJ" .kicad_pro)

          echo "PROJECT_NAME=$BASENAME" >> $GITHUB_ENV

      - name: Set branch name
        run: |
          echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Debug info
        run: |
          echo "PROJECT_NAME=${PROJECT_NAME}"
          echo "BRANCH_NAME=${BRANCH_NAME}"
          pwd
          ls -la

      - name: Check KiCad version
        run: |
          kicad-cli-nightly version

      - name: Create output directories
        run: |
          mkdir -p output
          mkdir -p artifacts/${BRANCH_NAME}

      - name: Export schematic PDF
        run: |
          kicad-cli-nightly sch export pdf \
            ${PROJECT_NAME}.kicad_sch \
            --output output/schematic.pdf

      - name: Convert schematic PDF to PNG
        run: |
          convert -density 300 \
            output/schematic.pdf[0] \
            artifacts/${BRANCH_NAME}/schematic.png

      - name: Export PCB PDF
        run: |
          kicad-cli-nightly pcb export pdf \
            --layers F.Cu,B.Cu,F.SilkS,Edge.Cuts \
            ${PROJECT_NAME}.kicad_pcb \
            --output output/pcb.pdf

      - name: Render PCB PNG
        run: |
          kicad-cli-nightly pcb render \
            --width 2000 \
            ${PROJECT_NAME}.kicad_pcb \
            --output artifacts/${BRANCH_NAME}/pcb.png

      - name: Copy PDFs
        run: |
          cp output/*.pdf artifacts/${BRANCH_NAME}/

      - name: Ensure README exists
        shell: bash
        run: |
          if [ ! -f README.md ]; then
            printf '# %s\n\n<!-- AUTO_GENERATED_START -->\n<!-- AUTO_GENERATED_END -->\n' \
              "${PROJECT_NAME}" > README.md
          fi

      - name: Generate README section
        shell: bash
        run: |
          {
            echo "## Auto Generated Preview"
            echo
            echo "Current branch: \`${BRANCH_NAME}\`"
            echo
            echo "### PCB"
            echo
            echo "![PCB](https://raw.githubusercontent.com/${{ github.repository }}/generated-files/${BRANCH_NAME}/pcb.png)"
            echo
            echo "### Schematic"
            echo
            echo "![Schematic](https://raw.githubusercontent.com/${{ github.repository }}/generated-files/${BRANCH_NAME}/schematic.png)"
            echo
            echo "### Downloads"
            echo
            echo "- [PCB PDF](https://raw.githubusercontent.com/${{ github.repository }}/generated-files/${BRANCH_NAME}/pcb.pdf)"
            echo "- [Schematic PDF](https://raw.githubusercontent.com/${{ github.repository }}/generated-files/${BRANCH_NAME}/schematic.pdf)"
          } > generated_section.md

      - name: Update README
        shell: bash
        run: |
          awk '
            BEGIN {p=1}
            /<!-- AUTO_GENERATED_START -->/ {
              print
              system("cat generated_section.md")
              p=0
              next
            }
            /<!-- AUTO_GENERATED_END -->/ {
              p=1
            }
            p
          ' README.md > README.new

          mv README.new README.md

      - name: Prepare generated-files branch
        shell: bash
        run: |
          git fetch origin generated-files || true

          if git show-ref --verify --quiet refs/remotes/origin/generated-files; then
            echo "generated-files branch exists"
          else
            git checkout --orphan generated-files

            git rm -rf . || true

            echo "# generated-files" > README.md

            git add README.md

            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"

            git commit -m "Initialize generated-files branch"

            git push origin generated-files

            git checkout "${BRANCH_NAME}"
          fi

      - name: Push generated files
        shell: bash
        run: |
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          SHA="${GITHUB_SHA::7}"

          mkdir -p /tmp/generated-files

          cp -r artifacts/* /tmp/generated-files/
          
          git fetch origin generated-files

          git checkout generated-files

          git rm -rf . || true

          cp -r /tmp/generated-files/* .

          git add .

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git commit -m "Auto update (${SHA}): ${ORIGINAL_MSG} [skip ci]" || echo "No changes"

          git push origin generated-files

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kicad-output
          path: artifacts/
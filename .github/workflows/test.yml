name: Export KiCad Outputs

on:
  push:

jobs:
  export:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install KiCad nightly
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-dev-nightly
          sudo apt update
          sudo apt install -y kicad-nightly imagemagick

      - name: Detect KiCad project
        run: |
          PROJ=$(find . -maxdepth 1 -name "*.kicad_pro" | head -n 1)

          if [ -z "$PROJ" ]; then
            echo "No KiCad project found"
            exit 1
          fi

          BASENAME=$(basename "$PROJ" .kicad_pro)

          echo "PROJECT_NAME=$BASENAME" >> $GITHUB_ENV

      - name: Show detected project
        run: |
          echo "PROJECT_NAME=${PROJECT_NAME}"

      - name: Check KiCad
        run: |
          kicad-cli-nightly version

      - name: Set branch name
        run: |
          echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Create output directories
        run: |
          mkdir -p output
          mkdir -p generated/${BRANCH_NAME}

      - name: Export schematic PDF
        run: |
          kicad-cli-nightly sch export pdf \
            ${PROJECT_NAME}.kicad_sch \
            --output output/schematic.pdf

      - name: Convert schematic PDF to PNG
        run: |
          convert -density 300 \
            output/schematic.pdf[0] \
            generated/${BRANCH_NAME}/schematic.png

      - name: Export PCB PDF
        run: |
          kicad-cli-nightly pcb export pdf \
            --layers F.Cu,B.Cu,F.SilkS,Edge.Cuts \
            ${PROJECT_NAME}.kicad_pcb \
            --output output/pcb.pdf

      - name: Render PCB PNG
        run: |
          kicad-cli-nightly pcb render \
            --width 2000 \
            ${PROJECT_NAME}.kicad_pcb \
            --output generated/${BRANCH_NAME}/pcb.png

      - name: Copy PDFs
        run: |
          cp output/*.pdf generated/${BRANCH_NAME}/

      - name: Generate README section
        run: |
          cat > generated_section.md <<EOF
          ## Auto Generated Preview

          Branch: \`${BRANCH_NAME}\`

          ### PCB

          ![PCB](https://raw.githubusercontent.com/${{ github.repository }}/generated/${BRANCH_NAME}/pcb.png)

          ### Schematic

          ![Schematic](https://raw.githubusercontent.com/${{ github.repository }}/generated/${BRANCH_NAME}/schematic.png)

          ### Downloads

          - [PCB PDF](https://raw.githubusercontent.com/${{ github.repository }}/generated/${BRANCH_NAME}/pcb.pdf)
          - [Schematic PDF](https://raw.githubusercontent.com/${{ github.repository }}/generated/${BRANCH_NAME}/schematic.pdf)

          EOF

      - name: Update README
        run: |
          awk '
            BEGIN {p=1}
            /<!-- AUTO_GENERATED_START -->/ {
              print
              system("cat generated_section.md")
              p=0
              next
            }
            /<!-- AUTO_GENERATED_END -->/ {
              p=1
            }
            p
          ' README.md > README.new

          mv README.new README.md

      - name: Prepare generated branch
        run: |
          git fetch origin generated || true

          if git show-ref --verify --quiet refs/remotes/origin/generated; then
            echo "generated branch exists"
          else
            git checkout --orphan generated
            git rm -rf . || true
            echo "# generated" > README.md
            git add README.md
            git commit -m "init generated branch"
            git push origin generated
            git checkout ${BRANCH_NAME}
          fi

      - name: Push generated files
        run: |
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          SHA="${GITHUB_SHA::7}"

          mkdir -p /tmp/generated

          cp -r generated/* /tmp/generated/
          cp README.md /tmp/generated/

          git fetch origin generated

          git checkout generated

          git rm -rf . || true

          cp -r /tmp/generated/* .

          git add .

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git commit -m "Auto update (${SHA}): ${ORIGINAL_MSG} [skip ci]" || echo "No changes"

          git push origin generated
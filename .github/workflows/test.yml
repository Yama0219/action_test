name: test

on:
  push:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:


      - name: Install KiCad
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-8.0-releases
          sudo apt update
          sudo apt install -y kicad

      - name: Check KiCad
        run: kicad-cli version

      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false